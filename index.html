<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아트머그 커스텀 테스트 페이지</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* 간단한 갤러리 레이아웃 */
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }
        .gallery-item h3 { margin: 10px 0 5px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>나의 커미션 작업물 목록</h1>
    <hr>

    <!-- 이미지가 출력될 공간 -->
    <div id="gallery" class="gallery-container">
        <p id="loading">데이터를 불러오는 중입니다...</p>
    </div>

    <script>
        // --- 설정 부분 (본인의 정보로 수정하세요) ---
        const GITHUB_USERNAME = 'sunoo-lee'; 
        const REPO_NAME = 'nutlify-test';
        const DATA_FOLDER = 'content/gallery'; // config.yml에 설정한 folder 경로
        // ------------------------------------------

        async function fetchGallery() {
            const galleryElement = document.getElementById('gallery');
            const loadingElement = document.getElementById('loading');

            try {
                // 1. GitHub API를 통해 폴더 내 파일 목록 가져오기
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${DATA_FOLDER}`);
                
                if (!response.ok) throw new Error('파일 목록을 불러오지 못했습니다.');
                
                const files = await response.json();

                // 2. 각 JSON 파일의 내용을 가져와서 화면에 추가
                // JSON 파일만 필터링 (확장자 체크)
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));

                if (jsonFiles.length === 0) {
                    galleryElement.innerHTML = '<p>등록된 이미지가 없습니다.</p>';
                    return;
                }

                // 기존 로딩 메시지 삭제
                loadingElement.remove();

                for (const file of jsonFiles) {
                    const contentResponse = await fetch(file.download_url);
                    const item = await contentResponse.json();

                    // HTML 요소 생성
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'gallery-item';
                    
                    itemDiv.innerHTML = `
                        <img src="${item.image}" alt="${item.title}">
                        <h3>${item.title}</h3>
                    `;
                    
                    galleryElement.appendChild(itemDiv);
                }

            } catch (error) {
                console.error(error);
                galleryElement.innerHTML = '<p>데이터를 불러오는 중 오류가 발생했습니다.</p>';
            }
        }

        // 페이지 로드 시 실행
        fetchGallery();

        // 넷플리파이 Identity 로그아웃 후 리다이렉트 처리 (선택사항)
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
