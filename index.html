<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Artmug Custom</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        h2 { border-left: 5px solid #333; padding-left: 10px; margin: 40px 0 20px; }

        /* 이미지 갤러리 그리드 */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .gallery-item { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .gallery-item img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .gallery-item h3 { font-size: 1rem; margin-top: 10px; text-align: center; }

        /* 비디오 그리드 (사용자 제공 스타일 기반) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .video-item { text-decoration: none; color: #333; display: block; transition: transform 0.2s; }
        .video-item:hover { transform: translateY(-5px); }
        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .video-title { margin-top: 10px; font-weight: bold; font-size: 0.95rem; }
    </style>
</head>
<body>

    <h2>작업물 갤러리</h2>
    <div id="gallery" class="gallery-container">로딩 중...</div>

    <h2>유튜브 작업물</h2>
    <div id="video-grid" class="video-grid">로딩 중...</div>

    <script>
        // [수정 필요] 본인의 정보 입력
        const GITHUB_USER = 'sunoo-lee'; 
        const REPO_NAME = 'netlify-test';

        // 유튜브 ID 추출 함수
        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // 데이터 로드 함수
        async function loadContent(folder, targetId, isVideo = false) {
            const container = document.getElementById(targetId);
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/content/${folder}`);
                if (!response.ok) throw new Error('데이터 없음');
                
                const files = await response.json();
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));
                
                container.innerHTML = ''; // 로딩 메시지 제거

                for (const file of jsonFiles) {
                    const dataRes = await fetch(file.download_url);
                    const data = await dataRes.json();

                    if (isVideo) {
                        const vId = getYoutubeId(data.url);
                        const thumb = `https://img.youtube.com/vi/${vId}/maxresdefault.jpg`;
                        container.innerHTML += `
                            <a href="${data.url}" target="_blank" class="video-item">
                                <div class="video-thumb" style="background-image: url('${thumb}');">
                                    <div class="play-icon">▶</div>
                                </div>
                                <p class="video-title">${data.title}</p>
                            </a>`;
                    } else {
                        container.innerHTML += `
                            <div class="gallery-item">
                                <img src="${data.image}" alt="${data.title}">
                                <h3>${data.title}</h3>
                            </div>`;
                    }
                }
            } catch (e) {
                container.innerHTML = '<p>데이터가 비어있거나 저장소 설정이 잘못되었습니다.</p>';
            }
        }

        // 실행
        window.onload = () => {
            loadContent('gallery', 'gallery');
            loadContent('videos', 'video-grid', true);
        };

        // Netlify Identity (초대 수락용)
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
