<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>작가 포트폴리오 관리</title>
    <!-- 1. Netlify Identity 위젯 스크립트 (필수) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <h1>이미지 갤러리 테스트</h1>
    <div id="gallery">
        <!-- 이미지가 출력될 공간 -->
    </div>

    <script>
        // 2. 로그인/로그아웃 이벤트 처리 (로그인 성공 시 admin으로 이동)
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
