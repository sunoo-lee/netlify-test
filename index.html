<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Test</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        
        /* 이미지 스타일 */
        .gallery-item { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; }
        .gallery-item img { width: 100%; height: auto; border-radius: 5px; }

        /* 비디오 스타일 */
        .video-item { text-decoration: none; color: #333; display: block; }
        .video-thumb { 
            width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; 
            position: relative; border-radius: 8px; background-color: #000;
        }
        .play-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); color: #fff; width: 40px; height: 40px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .video-title { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>이미지 작업물</h2>
    <div id="gallery-root" class="grid-container">데이터 로딩 중...</div>

    <h2>유튜브 작업물</h2>
    <div id="video-root" class="grid-container">데이터 로딩 중...</div>

    <script>
        // ================= [수정 필수 영역] =================
        const USER_NAME = 'sunoo-lee'; 
        const REPO_NAME = 'netlify-test';
        // ===================================================

        // 유튜브 ID 추출 로직
        function getVid(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const m = url.match(reg);
            return (m && m[2].length === 11) ? m[2] : null;
        }

        // GitHub API를 통해 데이터를 직접 불러오는 함수
        async function renderContents(folder, targetId, isVideo = false) {
            const root = document.getElementById(targetId);
            try {
                // 빌드된 JSON 파일이 아니라, 깃허브 폴더 내부 목록을 직접 요청함
                const listRes = await fetch(`https://api.github.com/repos/${USER_NAME}/${REPO_NAME}/contents/content/${folder}`);
                if (!listRes.ok) throw new Error('폴더 없음');
                
                const files = await listRes.json();
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));
                
                root.innerHTML = '';

                for (const f of jsonFiles) {
                    const dataRes = await fetch(f.download_url);
                    const item = await dataRes.json();

                    if (isVideo) {
                        const vId = getVid(item.url);
                        root.innerHTML += `
                            <a href="${item.url}" target="_blank" class="video-item">
                                <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${vId}/maxresdefault.jpg');">
                                    <div class="play-icon">▶</div>
                                </div>
                                <p class="video-title">${item.title}</p>
                            </a>`;
                    } else {
                        root.innerHTML += `
                            <div class="gallery-item">
                                <img src="${item.image}" alt="${item.title}">
                                <h3>${item.title}</h3>
                            </div>`;
                    }
                }
            } catch (err) {
                root.innerHTML = '<p>데이터를 불러올 수 없습니다. (저장소 Public 설정 확인 요망)</p>';
            }
        }

        // 초기 구동
        window.onload = () => {
            renderContents('gallery', 'gallery-root');
            renderContents('videos', 'video-root', true);
        };

        // Identity 설정 (초대 수락용)
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
