backend:
  name: git-gateway
  branch: main # 또는 master

media_folder: "images/uploads" # 사진 저장 경로
public_folder: "/images/uploads"

collections:
  - name: "gallery"
    label: "갤러리 관리"
    folder: "content/gallery" # 게시물 데이터가 저장될 폴더
    create: true # 추가 기능 활성화
    delete: true # 삭제 기능 활성화
    extension: json # 데이터를 JSON으로 저장 (JS에서 불러오기 쉬움)
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작업물 사진", name: "image", widget: "image" }
